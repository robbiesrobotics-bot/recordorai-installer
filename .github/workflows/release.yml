name: Release

# Build native installers for macOS / Windows / Linux on tag push,
# attach artifacts to the GitHub Release, and publish the
# `latest.json` manifest the Tauri auto-updater reads.
#
# Triggered by:  pushing a tag like `v0.1.0`
#                manually via the workflow_dispatch button (for dry runs)
#
# Required repo secrets (set later — see docs/packaging.md):
#   APPLE_CERTIFICATE                  base64 .p12 cert export
#   APPLE_CERTIFICATE_PASSWORD         password for the .p12
#   APPLE_SIGNING_IDENTITY             "Developer ID Application: ..."
#   APPLE_ID                           Apple ID email (notarytool)
#   APPLE_PASSWORD                     app-specific password
#   APPLE_TEAM_ID                      10-char team ID
#   WINDOWS_CERTIFICATE                base64 .pfx cert export
#   WINDOWS_CERTIFICATE_PASSWORD       password for the .pfx
#   WINDOWS_CERTIFICATE_THUMBPRINT     SHA1 thumbprint
#   TAURI_SIGNING_PRIVATE_KEY          updater signing key (Tauri)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD passphrase for the above
#
# Without these, the workflow still runs and produces UNSIGNED
# artifacts — useful for development. Production releases require
# every secret to be present; see docs/packaging.md for the bootstrap
# steps the human operator must run once.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_override:
        description: "Tag to use for the dry-run release"
        required: false
        default: "v0.0.0-dev"

permissions:
  contents: write  # for uploading release assets

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # 1. Build the Python sidecar binary on every target OS.
  #    PyInstaller can only build for the host OS, so the matrix is
  #    one job per OS. The output is uploaded as an artifact for
  #    the bundle job below.
  # ──────────────────────────────────────────────────────────────────────
  sidecar:
    name: Build Python sidecar (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # arm64 (M-series); Intel Macs run
                                    # this binary via Rosetta 2 — see
                                    # INSTALL.md for the user-facing
                                    # one-click prompt. macos-13 (Intel)
                                    # was dropped from the matrix because
                                    # GitHub-hosted Intel Mac runners
                                    # have prohibitive queue depth
                                    # (~15+ min) and Intel is <15% of
                                    # the Mac install base.
            triple: aarch64-apple-darwin
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
          - os: windows-2022
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pyinstaller

      - name: Build sidecar
        run: python packaging/build_sidecar.py

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: tauri-app/src-tauri/binaries/recordorai-install-${{ matrix.triple }}*
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # 2. Build the Tauri app per OS, embedding the sidecar from step 1.
  #    Tauri's bundler produces .dmg / .msi / .nsis / .deb / .rpm /
  #    .appimage in this step.
  # ──────────────────────────────────────────────────────────────────────
  bundle:
    name: Bundle (${{ matrix.os }})
    needs: sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          # NOTE: when --target is passed to `tauri build`, Cargo
          # nests outputs under target/<triple>/release/bundle/...
          # rather than target/release/bundle/. Globs reflect that.
          - os: macos-14
            triple: aarch64-apple-darwin
            tauri_target: aarch64-apple-darwin
            artifact_glob: |
              tauri-app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              tauri-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz*
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
            artifact_glob: |
              tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage*
          - os: windows-2022
            triple: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            artifact_glob: |
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi*
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe*
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: tauri-app/src-tauri/binaries

      - name: Make sidecar executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x tauri-app/src-tauri/binaries/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-app/src-tauri/target
          key: cargo-${{ matrix.triple }}-${{ hashFiles('tauri-app/src-tauri/Cargo.lock') }}

      - name: Install Tauri OS deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install front-end deps
        working-directory: tauri-app
        run: bun install --frozen-lockfile

      # ── Apple signing setup (no-op without secrets) ────────────────
      - name: Import Apple cert
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/cert.p12
          security create-keychain -p '' build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p '' build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k '' build.keychain
          rm /tmp/cert.p12

      # ── Inject signing config (opt-in based on present secrets) ───
      # The base tauri.conf.json ships without signing fields so
      # unsigned dev builds work cleanly. This step writes the
      # signing fields into the config iff the matching secrets are
      # set. When secrets are absent (v0.1 RC pre-cert period), the
      # build proceeds unsigned — OS-level "unidentified developer"
      # warnings are documented in INSTALL.md.
      - name: Inject signing config
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: python packaging/inject_signing_config.py

      # ── Build ──────────────────────────────────────────────────────
      - name: Build Tauri bundle
        working-directory: tauri-app
        env:
          # Sign-time secrets — the Tauri config interpolates these.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun x tauri build --target ${{ matrix.tauri_target }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.triple }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # 3. Publish the GitHub Release with all artifacts attached + the
  #    Tauri updater manifest pointing at them.
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: bundle
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Build updater manifest
        env:
          TAG: ${{ github.ref_name }}
        run: python packaging/build_updater_manifest.py --tag "$TAG" --artifacts artifacts/ --out latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
            latest.json
